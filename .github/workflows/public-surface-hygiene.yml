name: Public-surface hygiene

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  hygiene-check:
    runs-on: ubuntu-latest
    name: Diff + PR-metadata blocklist
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run hygiene check
        env:
          HYGIENE_BLOCKLIST: ${{ secrets.HYGIENE_BLOCKLIST }}
          HYGIENE_BLOCKLIST_HUB: ${{ secrets.HYGIENE_BLOCKLIST_HUB }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: node scripts/ci-hygiene-check.mjs
