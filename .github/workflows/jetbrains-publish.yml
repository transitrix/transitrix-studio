name: JetBrains Marketplace — publish

# Triggered on every GitHub Release. Derives pluginVersion automatically from
# the release tag (v2.2.0 → 2.2.0) so the JetBrains plugin version always
# mirrors the VS Code extension version — no manual bump needed.
#
# For manual dispatch, omit `version` to use extension/package.json (same as
# the VS Code release). Pass an explicit version only to republish or hotfix.
#
# Prerequisites (one-time maintainer setup — see intellij/PUBLISHING.md):
#   - CERTIFICATE_CHAIN      — contents of chain.crt (PEM)
#   - PRIVATE_KEY            — contents of private.pem (PEM)
#   - PRIVATE_KEY_PASSWORD   — passphrase used when generating the key
#   - PUBLISH_TOKEN          — permanent token from plugins.jetbrains.com
#
# NOTE: the very first upload of a NEW plugin must be done manually via the
# JetBrains Marketplace website; this workflow only handles subsequent updates.
# See intellij/PUBLISHING.md § First release.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Plugin version to publish (e.g. 3.0.0). Leave blank to use extension/package.json version.'
        required: false

permissions:
  contents: read

jobs:
  publish:
    name: Publish to JetBrains Marketplace
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set plugin version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            # GITHUB_REF_NAME is not the release tag on release events — use tag_name.
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
          elif [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="$(node -p "require('./extension/package.json').version")"
            echo "No workflow input — using extension/package.json version: $VERSION"
          fi
          if [ -z "$VERSION" ]; then
            echo "::error::Could not determine plugin version (release tag or workflow input)."
            exit 1
          fi
          sed -i "s/^pluginVersion = .*/pluginVersion = $VERSION/" intellij/gradle.properties
          echo "Plugin version set to: $VERSION"

      - name: Verify secrets are set
        env:
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
        run: |
          missing=()
          [ -z "$CERTIFICATE_CHAIN" ]    && missing+=(CERTIFICATE_CHAIN)
          [ -z "$PRIVATE_KEY" ]          && missing+=(PRIVATE_KEY)
          [ -z "$PRIVATE_KEY_PASSWORD" ] && missing+=(PRIVATE_KEY_PASSWORD)
          [ -z "$PUBLISH_TOKEN" ]        && missing+=(PUBLISH_TOKEN)
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing Actions secrets: ${missing[*]}"
            echo "::error::See intellij/PUBLISHING.md for setup instructions."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install root dependencies
        run: npm ci

      - name: Build webview bundle
        run: node scripts/build-webview-bundle.mjs

      - name: Publish plugin
        working-directory: intellij
        env:
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
        run: ./gradlew publishPlugin
