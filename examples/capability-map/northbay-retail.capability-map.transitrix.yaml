notation: capability-map
spec_version: "0.1"
title: NorthBay Retail — Business Capabilities Map
description: Full enterprise capability hierarchy for a mid-size retailer with current and target CMMI maturity for 2027.
version: "2.0"
date: "2026-05-12"

capability_map:
  id: CM-NB-RETAIL-001
  name: NorthBay Retail — Business Capabilities Map
  description: Three core verticals (Customer Engagement, Supply Chain, Financial Management) plus three cross-cutting horizontals (MDM, Cybersecurity, ESG).
  assessment_date: "2026-05-12"

  capabilities:
    - id: V1
      name: Customer Engagement
      type: domain
      description: All capabilities involved in attracting, retaining, and servicing the customer.
      current_maturity: 2
      target_maturity: 4
      target_date: "2027-12-31"
      owner_role: Chief Customer Officer
      applications:
        - APP-CRM-001
        - APP-MARKETING-CLOUD-001
      children:
        - id: V1.1
          name: Marketing
          current_maturity: 2
          target_maturity: 4
          target_date: "2027-06-30"
          children:
            - id: V1.1.1
              name: Campaign Management
              current_maturity: 2
              target_maturity: 4
              owner_role: Head of Performance Marketing
            - id: V1.1.2
              name: Loyalty Programmes
              current_maturity: 3
              target_maturity: 4
              owner_role: Loyalty Lead
            - id: V1.1.3
              name: Brand & Content
              current_maturity: 2
              target_maturity: 3
        - id: V1.2
          name: Sales Channels
          current_maturity: 2
          target_maturity: 4
          target_date: "2027-12-31"
          children:
            - id: V1.2.1
              name: In-store Retail
              current_maturity: 3
              target_maturity: 4
              owner_role: Director of Retail Operations
            - id: V1.2.2
              name: E-commerce
              current_maturity: 2
              target_maturity: 4
              owner_role: Head of Digital
              applications:
                - APP-OMS-001
                - APP-WEB-STORE-001
            - id: V1.2.3
              name: Mobile App Commerce
              current_maturity: 1
              target_maturity: 3
              target_date: "2026-12-31"
        - id: V1.3
          name: Customer Service
          current_maturity: 2
          target_maturity: 4
          children:
            - id: V1.3.1
              name: Pre-sale Support
              current_maturity: 2
              target_maturity: 3
            - id: V1.3.2
              name: Post-sale Service
              current_maturity: 2
              target_maturity: 4
            - id: V1.3.3
              name: Returns & Refunds
              current_maturity: 3
              target_maturity: 4

    - id: V2
      name: Supply Chain Management
      type: domain
      description: From supplier selection through inbound logistics to last-mile delivery.
      current_maturity: 3
      target_maturity: 4
      target_date: "2027-09-30"
      owner_role: Chief Supply Chain Officer
      children:
        - id: V2.1
          name: Sourcing & Procurement
          current_maturity: 3
          target_maturity: 4
          children:
            - id: V2.1.1
              name: Supplier Management
              current_maturity: 3
              target_maturity: 4
            - id: V2.1.2
              name: Contract Negotiation
              current_maturity: 2
              target_maturity: 4
        - id: V2.2
          name: Inventory Management
          current_maturity: 3
          target_maturity: 5
          target_date: "2027-12-31"
          children:
            - id: V2.2.1
              name: Demand Forecasting
              current_maturity: 2
              target_maturity: 5
              target_date: "2027-06-30"
            - id: V2.2.2
              name: Replenishment
              current_maturity: 3
              target_maturity: 5
            - id: V2.2.3
              name: Allocation & Assortment
              current_maturity: 3
              target_maturity: 4
        - id: V2.3
          name: Logistics
          current_maturity: 3
          target_maturity: 4
          children:
            - id: V2.3.1
              name: Inbound Logistics
              current_maturity: 4
              target_maturity: 4
            - id: V2.3.2
              name: Outbound Logistics & Last-mile
              current_maturity: 2
              target_maturity: 4
              target_date: "2027-09-30"

    - id: V3
      name: Financial Management
      type: domain
      description: Treasury, accounting, controlling, tax.
      current_maturity: 4
      target_maturity: 5
      owner_role: CFO
      children:
        - id: V3.1
          name: Treasury & Cash Management
          current_maturity: 4
          target_maturity: 5
        - id: V3.2
          name: Accounting & Reporting
          current_maturity: 4
          target_maturity: 5
          target_date: "2026-12-31"
        - id: V3.3
          name: Controlling & Planning
          current_maturity: 3
          target_maturity: 5

    - id: H1
      name: Master Data Management
      type: supporting
      description: Cross-cutting capability ensuring product, customer, and supplier data quality across all domains.
      current_maturity: 1
      target_maturity: 3
      target_date: "2027-12-31"
      owner_role: Head of Data Governance

    - id: H2
      name: Cybersecurity
      type: supporting
      description: Information security, identity & access management, incident response.
      current_maturity: 2
      target_maturity: 4
      target_date: "2027-06-30"
      owner_role: CISO

    - id: H3
      name: ESG & Compliance
      type: supporting
      description: Environmental reporting, social responsibility, regulatory compliance across all markets.
      current_maturity: 2
      target_maturity: 3
      target_date: "2027-12-31"
      owner_role: Chief Sustainability Officer
