              name: Mobile App Commerce
              type: domain
              current_maturity: 1
              target_maturity: 3
              target_date: "2026-12-31"
        - id: CAPABILITY-V1.3
          name: Customer Service
          type: domain
          current_maturity: 2
          target_maturity: 4
          children:
