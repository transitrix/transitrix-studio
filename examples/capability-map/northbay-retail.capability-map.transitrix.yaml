      name: Customer Engagement
      type: domain
      description: All capabilities involved in attracting, retaining, and servicing the customer.
      current_maturity: 2
      target_maturity: 4
      target_date: "2027-12-31"
      owner_role: ROLE-CCO-001
      applications:
        - APP-CRM-001
        - APP-MARKETING-CLOUD-001
      children:
        - id: CAPABILITY-V1.1
          name: Marketing
          type: domain
          current_maturity: 2
          target_maturity: 4
          target_date: "2027-06-30"
          children:
            - id: CAPABILITY-V1.1.1
              name: Campaign Management
              type: domain
              current_maturity: 2
              target_maturity: 4
              owner_role: ROLE-MKTG-001
            - id: CAPABILITY-V1.1.2
              name: Loyalty Programmes
              type: domain
              current_maturity: 3
              target_maturity: 4
              owner_role: ROLE-LOYALTY-001
            - id: CAPABILITY-V1.1.3
              name: Brand & Content
              type: domain
              current_maturity: 2
              target_maturity: 3
        - id: CAPABILITY-V1.2
          name: Sales Channels
          type: domain
          current_maturity: 2
          target_maturity: 4
          target_date: "2027-12-31"
          children:
            - id: CAPABILITY-V1.2.1
              name: In-store Retail
              type: domain
              current_maturity: 3
              target_maturity: 4
              owner_role: Director of Retail Operations
            - id: CAPABILITY-V1.2.2
              name: E-commerce
              type: domain
              current_maturity: 2
              target_maturity: 4
              owner_role: ROLE-DIGITAL-001
              applications:
                - APP-OMS-001
                - APP-WEB-STORE-001
