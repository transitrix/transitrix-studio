# CORPUS CELL: M-Hi-A-Hi-3
# Element count: 15 (8 tasks, 1 event, 6 gateways)
# Cross-lane flows: 12/14 (86%)
# Cycles: none (acyclic)
# Gateway density: 40% (6/15 elements)
# Lanes: 3 (initiator, processor, reviewer)
# Purpose: Medium diagram with multiple gateways and very high cross-lane interaction; tests complex routing and port distribution
# Source: synthetic workflow with parallel processing and reviews

process:
  id: process-medium-complex-workflow
  name: Medium Complex Workflow
  pools:
    - id: pool-medium-complex-workflow
      name: MediumComplexWorkflow
      lanes:
        - id: lane-initiator
          name: Initiator
          elements:
            - id: start
              type: startEvent
              name: Initiate
            - id: prepare
              type: task
              name: Prepare
            - id: gw-ready
              type: exclusiveGateway
              name: Ready?

        - id: lane-processor
          name: Processor
          elements:
            - id: gw-parallel-split
              type: parallelGateway
              name: Split Work
            - id: process-a
              type: task
              name: Process A
            - id: process-b
              type: task
              name: Process B
            - id: process-c
              type: task
              name: Process C
            - id: gw-parallel-join
              type: parallelGateway
              name: Merge Work
            - id: compile
              type: task
              name: Compile Results

        - id: lane-reviewer
          name: Reviewer
          elements:
            - id: review
              type: task
              name: Review
            - id: gw-review-decision
              type: exclusiveGateway
              name: Approved?
            - id: approve
              type: task
              name: Approve
            - id: request-changes
              type: task
              name: Request Changes
            - id: gw-final
              type: exclusiveGateway
              name: Final Check
            - id: end-ok
              type: endEvent
              name: Done

  flows:
    - id: flow-1
      from: start
      to: prepare
    - id: flow-2
      from: prepare
      to: gw-ready
    - id: flow-3
      from: gw-ready
      to: gw-parallel-split
    - id: flow-4
      from: gw-parallel-split
      to: process-a
    - id: flow-5
      from: gw-parallel-split
      to: process-b
    - id: flow-6
      from: gw-parallel-split
      to: process-c
    - id: flow-7
      from: process-a
      to: gw-parallel-join
    - id: flow-8
      from: process-b
      to: gw-parallel-join
    - id: flow-9
      from: process-c
      to: gw-parallel-join
    - id: flow-10
      from: gw-parallel-join
      to: compile
    - id: flow-11
      from: compile
      to: review
    - id: flow-12
      from: review
      to: gw-review-decision
    - id: flow-13
      from: gw-review-decision
      to: approve
      condition: approved
    - id: flow-14
      from: gw-review-decision
      to: request-changes
      condition: needs-work
    - id: flow-15
      from: approve
      to: gw-final
    - id: flow-16
      from: request-changes
      to: gw-final
    - id: flow-17
      from: gw-final
      to: prepare
      condition: revise
    - id: flow-18
      from: gw-final
      to: end-ok
      condition: done
