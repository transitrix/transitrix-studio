# CORPUS CELL: L-Mi-A-Lo-3
# Element count: 35 (27 tasks, 2 events, 6 gateways)
# Cross-lane flows: 8/34 (24%)
# Cycles: none (acyclic)
# Gateway density: 17.1% (6/35 elements)
# Lanes: 3 (requester, processor, validator)
# Purpose: Large diagram, sparse gates, moderate cross-lane; tests scaling and layout algorithm efficiency
# Source: synthetic multi-stage processing pipeline

process:
  id: process-large-order-process
  name: Large Order Process
  pools:
    - id: pool-large-order-process
      name: LargeOrderProcess
      lanes:
    - id: lane-requester
      name: Requester
      elements:
        - id: start
          type: startEvent
          name: Request
        - id: fill-form
          type: task
          name: Fill Form
        - id: attach-docs
          type: task
          name: Attach Docs
        - id: submit
          type: task
          name: Submit
        - id: end
          type: endEvent
          name: Done

    - id: lane-processor
      name: Processor
      elements:
        - id: receive
          type: task
          name: Receive Request
        - id: parse
          type: task
          name: Parse Data
        - id: gw-quality
          type: exclusiveGateway
          name: Good Data?
        - id: process-a
          type: task
          name: Process Path A
        - id: process-b
          type: task
          name: Process Path B
        - id: task-log-a
          type: task
          name: Log Path A
        - id: task-log-b
          type: task
          name: Log Path B
        - id: gw-merge
          type: exclusiveGateway
          name: Merge
        - id: notify-done
          type: task
          name: Notify Done
        - id: queue-validation
          type: task
          name: Queue for Validation

    - id: lane-validator
      name: Validator
      elements:
        - id: validate-a
          type: task
          name: Validate A
        - id: validate-b
          type: task
          name: Validate B
        - id: gw-validate
          type: exclusiveGateway
          name: Valid?
        - id: approve
          type: task
          name: Approve
        - id: request-fix
          type: task
          name: Request Fix
        - id: fix-data
          type: task
          name: Fix Data
        - id: requeue
          type: task
          name: Requeue
        - id: archive-ok
          type: task
          name: Archive OK
        - id: archive-fail
          type: task
          name: Archive Fail
        - id: task-notify-ok
          type: task
          name: Notify OK
        - id: task-notify-fail
          type: task
          name: Notify Fail

