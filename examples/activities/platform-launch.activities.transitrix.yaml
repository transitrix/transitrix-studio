    unit: UNIT-ENGINEERING

  - id: A-003
    name: Backend implementation
    duration: 15
    sort: 30
    predecessors: [A-002]
    goals: [GOAL-PLATFORM-002]
    tags: [q3-priority]
    unit: UNIT-ENGINEERING
    delivers_changes: [CHG-PLATFORM-001]

  - id: A-004
    name: Frontend implementation
    duration: 12
    sort: 40
    predecessors: [A-002]
    goals: [GOAL-CUST-001]
    tags: [q3-priority]
    unit: UNIT-ENGINEERING
