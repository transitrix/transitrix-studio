# Demo requirement — GDPR Art. 7 conditions for consent.
# Acme Corp EU compliance demo scenario.

notation: requirement
id: REQUIREMENT-GDPR-CONSENT-1
name: "Obtain and record explicit consent before processing personal data"
description: >
  The controller must obtain explicit, informed, and unambiguous consent before
  processing personal data for marketing and profiling purposes. Consent records
  must be kept and the data subject must be able to withdraw consent at any time
  as easily as it was given.

severity: high
derived_from:
