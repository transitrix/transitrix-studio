# Demo requirement — GDPR Art. 20 data portability.
# NorthBay Retail EU compliance demo scenario.

notation: requirement
id: REQUIREMENT-GDPR-PORTABILITY-1
name: "Provide personal data in machine-readable format on request"
description: >
  On request, the controller must provide the data subject with their personal data
  in a structured, commonly used, and machine-readable format (e.g. JSON or CSV)
  within 30 days. The data must be transmittable to another controller where
  technically feasible.

severity: medium
derived_from:
  - LAW-GDPR-1

