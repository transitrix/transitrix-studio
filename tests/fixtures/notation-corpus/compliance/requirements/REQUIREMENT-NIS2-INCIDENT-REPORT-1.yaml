# Demo requirement — NIS2 Art. 23 incident reporting.
# Acme Corp EU compliance demo scenario.

notation: requirement
id: REQUIREMENT-NIS2-INCIDENT-REPORT-1
name: "Report significant cybersecurity incidents to authority within 24 hours"
description: >
  Entities in scope must notify the competent national authority of any significant
  cybersecurity incident within 24 hours of becoming aware of it (early warning),
  followed by a full incident notification within 72 hours and a final report within
  one month. An incident is significant if it causes severe operational disruption
  or financial loss.

severity: high
derived_from:
  - LAW-NIS2-1

