# Demo requirement — NIS2 Art. 21 supply-chain risk management.
# Acme Corp EU compliance demo scenario.

notation: requirement
id: REQUIREMENT-NIS2-SUPPLY-CHAIN-1
name: "Assess and manage cybersecurity risks in the supply chain"
description: >
  Entities must implement measures to assess and manage cybersecurity risks arising
  from relationships with suppliers and service providers. This includes contractual
  security clauses, supplier risk assessments, and monitoring of critical third-party
  dependencies. The policy must cover at least Tier-1 suppliers that can affect
  service continuity.

severity: medium
derived_from:
