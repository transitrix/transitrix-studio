# Acme Corp EU compliance demo scenario.

notation: assertion
id: ASSERTION-ECOMM-GDPR-ERASURE-1
about: REQUIREMENT-GDPR-DATA-ERASURE-1
subject: PRODUCT-ECOMM-1

# Realised via the order-fulfilment stages where personal data is stored.
realised_via:
  - STAGE-1   # Receive order — captures personal data at intake
  - STAGE-2   # Pick & pack — reads personal data for fulfilment
  - STAGE-3   # Ship — transmits personal data to carrier

status: non_compliant

evidence:
  - kind: note
    text: >
      Erasure requests are forwarded to the active-order database and the CRM within
      the 30-day window. KNOWN GAP: the order-history archive (cold storage, 7-year
      fiscal retention) is not covered by the erasure pipeline — archived records
      are retained until manual batch purge. Remediation: ISSUE-ECOMM-ARCHIVE-PURGE-1,
      target Q1 2026 (overdue). Re-assessment blocked until archive purge is deployed.

